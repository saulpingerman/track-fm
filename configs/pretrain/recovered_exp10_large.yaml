# Head-matched ±0.3° FIXED reference for the geometry verdict (user's
# decision rule, 2026-07-19): identical to scaling_large_50M except
# head_mlp_hidden — the fixed-grid comparator cone-mlp must tie/beat on
# fixed's own metric for cone to win outright. Also disambiguates the
# fixed-series scaling narrative (was the 18M knee partly head-limited?).
data_dir: ~/data/trackfm/materialized/v1
checkpoint_dir: ~/data/trackfm/checkpoints
model:
  d_model: 384
  nhead: 16
  num_layers: 8
  dim_feedforward: 2048
  dropout: 0.1
  max_seq_len: 128
  grid_size: 64
  grid_range: 0.3
  num_freqs: 12
  
normalization:
  lat_center: 56.25
  lat_scale: 1.0
  lon_center: 11.5
  lon_scale: 2.0
  sog_scale: 30.0
  dt_scale: 300.0
train:
  learning_rate: 0.0003
  weight_decay: 1.0e-05
  batch_size: 1280
  max_horizon: 400
  num_horizon_samples: 4
  warmup_steps: 500
  lr_schedule: cosine
  sigma: 0.003
  dr_sigma: 0.05
  precision: bf16
  compile: false
  val_interval_minutes: 30
  early_stop_patience: 10
  num_workers: 8
  seed: 17
  max_steps: 39062
mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment: trackfm/scaling
  run_name: recovered-exp10-large
