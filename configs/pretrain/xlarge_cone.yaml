data_dir: ~/data/trackfm/materialized/v1
checkpoint_dir: ~/data/trackfm/checkpoints
model:
  d_model: 768
  nhead: 16
  num_layers: 16
  dim_feedforward: 3072
  dropout: 0.1
  max_seq_len: 128
  grid_size: 192
  # grid_range=0.3 matches every model in the scaling series (small fixed,
  # small cone, small direct, small cone+direct) so val_fixgrid_p90rank
  # restricts to the same ±0.3° box they're measured on — apples-to-apples
  # against the scaling curve. Also makes cone loss's g_sig = sigma/grid_range
  # land at the canonical 0.01 canvas value with the small-cone sigma.
  grid_range: 0.3
  num_freqs: 18
  grid_mode: cone
  cone_r0: 0.02
  cone_v: 0.000171
  cone_p: 1.0
normalization:
  lat_center: 56.25
  lat_scale: 1.0
  lon_center: 11.5
  lon_scale: 2.0
  sog_scale: 30.0
  dt_scale: 300.0
train:
  learning_rate: 0.0003
  weight_decay: 1.0e-05
  batch_size: 128
  max_horizon: 800
  num_horizon_samples: 4
  warmup_steps: 1000
  lr_schedule: cosine
  max_epochs: 1
  sigma: 0.003
  dr_sigma: 0.05
  precision: bf16
  compile: false
  val_interval_minutes: 30
  early_stop_patience: 10
  num_workers: 8
  seed: 17
mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment: trackfm/scaling
  run_name: xlarge-cone-flagship
