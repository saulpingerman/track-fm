data_dir: ~/data/trackfm/materialized/v1
checkpoint_dir: ~/data/trackfm/checkpoints
# xlarge-cone-MLP: the missing scaling cell (width x cone x projector never
# composed). Fills the paper scaling table AND de-risks the flagship
# recipe at d=768 before the full-data run. Recipe held at the family
# standard (3e-4, bs640, h4) so the scaling comparison stays on-axis;
# the LR question is settled separately by the CHAIN15 A/B.
# 2026-07-17). bs=640: bs=768 trained at 83.7GB peak but OOMed at the
model:
  d_model: 768
  nhead: 16
  num_layers: 16
  dim_feedforward: 3072
  dropout: 0.1
  max_seq_len: 128
  grid_size: 64
  grid_range: 0.3
  num_freqs: 12
  grid_mode: cone
  cone_r0: 0.02
  cone_v: 0.000171
  cone_p: 1.0
  head_mlp_hidden: 768
normalization:
  lat_center: 56.25
  lat_scale: 1.0
  lon_center: 11.5
  lon_scale: 2.0
  sog_scale: 30.0
  dt_scale: 300.0
train:
  learning_rate: 0.0003
  weight_decay: 1.0e-05
  batch_size: 640
  max_horizon: 800
  num_horizon_samples: 4
  warmup_steps: 500
  lr_schedule: cosine
  sigma: 0.003
  dr_sigma: 0.05
  precision: bf16
  compile: false
  val_interval_minutes: 30
  early_stop_patience: 10
  num_workers: 8
  seed: 17
  max_steps: 78125
mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment: trackfm/scaling
  run_name: scaling-xlarge-cone-mlp-50M
