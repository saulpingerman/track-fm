# Smoke test: Small model, subset data, 200 steps. Verifies the full
# trainer/MLflow/checkpoint path end-to-end in ~minutes.
data_dir: ~/data/trackfm/materialized/smoke
checkpoint_dir: ~/data/trackfm/checkpoints

model:
  d_model: 128
  nhead: 8
  num_layers: 4
  dim_feedforward: 512
  max_seq_len: 128
  grid_size: 64
  grid_range: 0.3
  num_freqs: 12

train:
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5
  batch_size: 64
  max_horizon: 800
  num_horizon_samples: 4
  warmup_steps: 20
  max_steps: 200
  sigma: 0.003
  dr_sigma: 0.05
  precision: bf16
  val_interval_minutes: 2
  early_stop_patience: 100
  num_workers: 4
  seed: 17

mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment: trackfm/smoke
  run_name: smoke
