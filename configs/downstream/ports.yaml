# Port-prediction task suite (origin / destination / ETA).
# Trains three heads on the pretrained TrackFM encoder once the XLarge
# backbone exists; runnable from random init for baselines.
data_dir: ~/data/trackfm/ports/v1
checkpoint_dir: ~/data/trackfm/checkpoints/ports
backbone: ~/data/trackfm/checkpoints/xlarge-26mo/best.pt   # null = random init

tasks:
  origin:                       # where did the vessel come from
    type: classification
    label_column: origin
  destination:                  # where is it going
    type: classification
    label_column: destination
  eta:                          # seconds until arrival, log1p target
    type: regression
    label_column: remaining_s

model:                          # encoder — must match backbone architecture
  d_model: 768
  nhead: 16
  num_layers: 16
  dim_feedforward: 3072
  max_seq_len: 128
  grid_size: 64
  grid_range: 0.3
  num_freqs: 12

head:
  pooling: mean                 # pretrained: mean; random-init: last (exp 12/13 finding)
  dropout: 0.3

train:
  learning_rate: 2.0e-4
  weight_decay: 0.0
  batch_size: 256
  max_epochs: 50
  early_stopping_patience: 10
  precision: bf16
  seed: 17

mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment: trackfm/ports
