task: classification
label_column: destination
data_dir: ~/data/trackfm/ports/v2
checkpoint_dir: ~/data/trackfm/checkpoints/finetune/ft_seeds5/xlarge-fixed-full-s18
backbone: ~/data/trackfm/checkpoints/scaling-xlarge-50M/best.pt
model:
  d_model: 768
  nhead: 16
  num_layers: 16
  dim_feedforward: 3072
  dropout: 0.1
  max_seq_len: 128
  grid_size: 64
  grid_range: 0.3
  num_freqs: 12
normalization:
  lat_center: 56.25
  lat_scale: 1.0
  lon_center: 11.5
  lon_scale: 2.0
  sog_scale: 30.0
  dt_scale: 300.0
train:
  pooling: mean
  batch_size: 256
  learning_rate: 0.0002
  weight_decay: 0.0
  max_train_windows: 300000
  precision: bf16
  seed: 18
  strategy: full
  max_epochs: 15
  early_stopping_patience: 4
mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment: trackfm/ft-port-dest
  run_name: xlarge-fixed-full-s18
