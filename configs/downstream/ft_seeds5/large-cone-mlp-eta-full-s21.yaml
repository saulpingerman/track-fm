task: regression
label_column: remaining_s
data_dir: ~/data/trackfm/ports/v2
checkpoint_dir: ~/data/trackfm/checkpoints/finetune/ft_seeds5/large-cone-mlp-eta-full-s21
backbone: ~/data/trackfm/checkpoints/scaling-large-cone-mlp-50M/best.pt
model:
  d_model: 384
  nhead: 16
  num_layers: 8
  dim_feedforward: 2048
  dropout: 0.1
  max_seq_len: 128
  grid_size: 64
  grid_range: 0.3
  num_freqs: 12
  grid_mode: cone
  cone_r0: 0.02
  cone_v: 0.000171
  cone_p: 1.0
  head_mlp_hidden: 384
normalization:
  lat_center: 56.25
  lat_scale: 1.0
  lon_center: 11.5
  lon_scale: 2.0
  sog_scale: 30.0
  dt_scale: 300.0
train:
  pooling: mean
  batch_size: 256
  learning_rate: 0.0002
  weight_decay: 0.0
  max_train_windows: 300000
  precision: bf16
  seed: 21
  strategy: full
  max_epochs: 15
  early_stopping_patience: 4
mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment: trackfm/ft-eta
  run_name: large-cone-mlp-eta-full-s21
