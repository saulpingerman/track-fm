task: classification
label_column: destination
data_dir: ~/data/trackfm/ports/v2
checkpoint_dir: ~/data/trackfm/checkpoints/finetune/ft_sweep_a/ctx-geotraffic
backbone: ~/data/trackfm/checkpoints/scaling-small-cone-ctx-geotraffic-50M/best.pt
model:
  d_model: 128
  nhead: 8
  num_layers: 4
  dim_feedforward: 512
  dropout: 0.1
  max_seq_len: 128
  grid_size: 64
  grid_range: 0.3
  num_freqs: 12
  grid_mode: cone
  cone_r0: 0.02
  cone_v: 0.000171
  cone_p: 1.0
  context_mode: geo_traffic
normalization:
  lat_center: 56.25
  lat_scale: 1.0
  lon_center: 11.5
  lon_scale: 2.0
  sog_scale: 30.0
  dt_scale: 300.0
train:
  strategy: lp
  pooling: mean
  batch_size: 512
  max_epochs: 8
  early_stopping_patience: 3
  learning_rate: 0.0002
  weight_decay: 0.0
  max_train_windows: 300000
  precision: bf16
  seed: 17
mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment: trackfm/ft-port-dest
  run_name: ctx-geotraffic-lp
