task: classification
label_column: destination
data_dir: ~/data/trackfm/ports/v2
checkpoint_dir: ~/data/trackfm/checkpoints/finetune/ft_sweep_a/large-fixed
backbone: ~/data/trackfm/checkpoints/scaling-large-50M/best.pt
model:
  d_model: 384
  nhead: 16
  num_layers: 8
  dim_feedforward: 2048
  dropout: 0.1
  max_seq_len: 128
  grid_size: 64
  grid_range: 0.3
  num_freqs: 12
normalization:
  lat_center: 56.25
  lat_scale: 1.0
  lon_center: 11.5
  lon_scale: 2.0
  sog_scale: 30.0
  dt_scale: 300.0
train:
  strategy: lp
  pooling: mean
  batch_size: 512
  max_epochs: 8
  early_stopping_patience: 3
  learning_rate: 0.0002
  weight_decay: 0.0
  max_train_windows: 300000
  precision: bf16
  seed: 17
mlflow:
  tracking_uri: http://127.0.0.1:5000
  experiment: trackfm/ft-port-dest
  run_name: large-fixed-lp
